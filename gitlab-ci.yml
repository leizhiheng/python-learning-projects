      # module: fs
      st_fs_get_cache_dir() {
        local bin_name=${1:?Missing argument \`\$1 - bin_name\` when calling st_fs_get_cache_dir.}

        local cache_dir="$HOME/.cache/sh-toolbox/$bin_name"
        echo "$cache_dir"

        mkdir -p "$cache_dir"
      }

      st_fs_file_lock() {
        local path=${1:?Missing argument \`\$1 - path\` when calling st_fs_file_lock.}
        local fd=${2:?Missing argument \`\$1 - path\` when calling st_fs_file_lock.}
        local block=${3:-}

        mkdir -p "$(dirname "$path")"
        eval "exec $fd> \"$path\""

        local block_arg=
        if [ -z "$block" ]; then
          block_arg="-n"
        fi

        if ! flock $block_arg $fd; then
          return 1
        fi

        eval "echo $$ 1>&$fd"
      }

      st_fs_install_command() {
        local command_dir=${1:?Missing argument \`\$1 - command_dir\` when calling st_fs_install_command.}
        local command_url=${2:?Missing argument \`\$2 - command_url\` when calling st_fs_install_command.}
        local command_name=${3:?Missing argument \`\$3 - command_name\` when calling st_fs_install_command.}

        st_fs_download_file "$command_url" "$command_dir" "$command_name"

        local command_abs_dir
        command_abs_dir=$(cd -- "$command_dir" && pwd)
        chmod +x "$command_abs_dir/$command_name"

        if ! (echo "$PATH" | grep -Eq "$command_abs_dir"); then
          export PATH="$command_abs_dir:$PATH"
        fi
      }

      st_gitlab_install_command() {
        local gitlab_raw_file_url=${1:?Missing argument \`\$1 - gitlab_raw_file_url\` when calling st_gitlab_install_command.}
        local command_dir=${2:?Missing argument \`\$2 - command_dir\` when calling st_gitlab_install_command.}
        local command_name=${3:?Missing argument \`\$3 - command_name\` when calling st_gitlab_install_command.}
        local gitlab_api_v4_url=${4:?Missing argument \`\$4 - gitlab_api_v4_url\` when calling st_gitlab_install_command.}
        local gitlab_token=${5:?Missing argument \`\$5 - gitlab_token\` when calling st_gitlab_install_command.}

        local project
        project=$(echo "$gitlab_raw_file_url" | awk -F '/-/raw/' '{print $1}' | sed -E 's/^https?:\/\/[a-z\.]+\///g')
        local file_path
        file_path=$(echo "$gitlab_raw_file_url" | awk -F '/-/raw/' '{print $NF}')
        local ref
        ref=$(dirname "$file_path")
        file_path=$(basename "$file_path")

        mkdir -p "$command_dir"
        curl \
          --progress-bar \
          --header "PRIVATE-TOKEN: $gitlab_token" \
          --output "$command_dir/$command_name" \
          "$gitlab_api_v4_url/projects/$(echo "$project" | sed -E 's/\//%2F/g')/repository/files/$(echo "$file_path" | sed -E 's/\//%2F/g')/raw?ref=$ref"

        local command_abs_dir
        command_abs_dir=$(cd -- "$command_dir" && pwd)
        chmod +x "$command_abs_dir/$command_name"

        if ! (echo "$PATH" | grep -Eq "$command_abs_dir"); then
          export PATH="$command_abs_dir:$PATH"
        fi
      }

      st_fs_download_file() {
        local url=${1:?Missing argument \`\$1 - url\` when calling st_fs_download_file.}
        local directory=${2:?Missing argument \`\$2 - directory\` when calling st_fs_download_file.}
        local filename=${3:?Missing argument \`\$3 - filename\` when calling st_fs_download_file.}

        mkdir -p "$directory"
        local abs_dir
        abs_dir=$(cd -- "$directory" && pwd)

        if (which curl >&/dev/null); then
          curl -L "$url" -o "$abs_dir/$filename"
        elif (which wget >&/dev/null); then
          wget "$url" -O "$abs_dir/$filename"
        else
          st_log_error "wget or curl not found when calling st_fs_download_file."
          return 1
        fi
      }

      st_fs_add_host() {
        local domain=${1:?Missing argument \`\$1 - domain\` when calling st_fs_add_host.}
        local ip=${2:?Missing argument \`\$2 - ip\` when calling st_fs_add_host.}

        if (grep -Eq "$domain" /etc/hosts); then
          echo "$(sed "s/.*$domain/$ip $domain/g" /etc/hosts)" >/etc/hosts # if you use `sed -i ...` directly, it will fail and prompt: sed: can't move '/etc/hosts...' to '/etc/hosts': Resource busy.
        else
          echo "$ip $domain" >>/etc/hosts
        fi
      }

      st_fs_read_string_from_text_file() {
        local text_file=${1:?Missing argument \`\$1 - text_file\` when calling st_fs_read_string_from_text_file.}
        local string_regex=${2:?Missing argument \`\$2 - string_regex\` when calling st_fs_read_string_from_text_file.}
        local line_regex=${3-.*}

        grep -E "$line_regex" "$text_file" | grep -Eo "$string_regex"
      }

      st_fs_write_string_into_text_file() {
        local text_file=${1:?Missing argument \`\$1 - text_file\` when calling st_fs_write_string_into_text_file.}
        local string_content=${2:?Missing argument \`\$2 - string_content\` when calling st_fs_write_string_into_text_file.}
        local string_regex=${3:?Missing argument \`\$3 - string_regex\` when calling st_fs_write_string_into_text_file.}
        local line_regex=${4-.*}

        if [ "$(uname)" = 'Darwin' ]; then
          if [ -L "$text_file" ]; then
            sed -Ei '' "/$line_regex/s/$string_regex/$string_content/g" "$(readlink -f $text_file)"
          else
            sed -Ei '' "/$line_regex/s/$string_regex/$string_content/g" "$text_file"
          fi
        else
          sed -Ei --follow-symlinks "/$line_regex/s/$string_regex/$string_content/g" "$text_file"
        fi
      }

      # module: git
      st_git_config_user_name_email() {
        local user_name=${1:?Missing argument \`\$1 - user_name\` when calling st_git_config_user_name_email.}
        local user_email=${2:?Missing argument \`\$2 - user_email\` when calling st_git_config_user_name_email.}

        git config --global user.name "$user_name"
        git config --global user.email "$user_email"
      }

      st_git_config_color_ui() {
        local color_option=${1:-auto}
        if !(echo "$color_option" | grep -E '(always|auto|false|never|no|off|on|true|yes)'); then
          st_log_error "Illegal argument \`\$1 - color_option\`($color_option) when calling st_git_config_color_ui. Should be one of always|auto|false|never|no|off|on|true|yes."
          return 1
        fi

        git config --global color.ui "$color_option"
      }

      st_git_clone() {
        local repository=${1:?Missing argument \`\$1 - repository\` when calling st_git_clone.}
        local ref_or_commit=${2:-}
        local directory=${3:-$(basename "$repository" | sed 's|\.git$||g')}
        local depth=${4:-}

        if [ -n "$depth" ] && (!(st_number_is_int "$depth") || [ $depth -le 0 ]); then
          st_log_error "Illegal argument \`\$4 - depth\` (should: int, > 0) when calling st_git_clone."
          return 1
        fi

        git init "$directory"
        cd "$directory" # cd {

        git remote remove origin 2>/dev/null || true
        git remote add origin "$repository"

        if [ -z "$ref_or_commit" ]; then
          ref_or_commit=$(git remote show origin | grep -E 'HEAD branch:' | awk -F ': ' '{print $NF}')
        fi

        local depth_arg="$([ -n "$depth" ] && echo "--depth=$depth")"
        git fetch --progress $depth_arg origin $ref_or_commit
        git reset --hard FETCH_HEAD

        cd $OLDPWD # } cd
      }

      st_git_info() {
        local repo_root=${1:-.}
        cd "$repo_root" # cd {

        echo "Repo Url: $(git remote get-url origin)
      Commit Id: $(git rev-parse HEAD)
      Author: $(git log --format='%an <%ae>' -1)
      Date: $(git log --format='%ad' -1)"

        local tags
        tags=$(git tag --points-at HEAD | xargs echo | sed 's/ /, /g')
        if [ -n "$tags" ]; then
          echo "Tags: $tags"
        fi

        cd $OLDPWD # } cd
      }

