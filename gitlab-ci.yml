      # module: repo
      st_repo_init_and_sync() {
        local manifest_url=${1:?Missing argument \`\$1 - manifest_url\` when calling st_repo_init_and_sync.}
        local ref_or_commit=${2:-}
        local directory=${3:-$(basename "$manifest_url" | sed 's|\.git$||g')}
        local depth=${4:-}
        local manifest_name=${5:-}

        if [ -n "$depth" ] && (!(st_number_is_int "$depth") || [ $depth -le 0 ]); then
          st_log_error "Illegal argument \`\$4 - depth\` (should: int, > 0) when calling st_repo_init_and_sync."
          return 1
        fi

        local available_ref_or_commit=$ref_or_commit
        if [ -n "$ref_or_commit" ] && (git ls-remote "$manifest_url" | grep -qE "refs/tags/$ref_or_commit$"); then
          available_ref_or_commit=$(git ls-remote "$manifest_url" | (grep -E "refs/tags/$ref_or_commit$" || true) | awk '{print $1}')
          st_log_info "\`repo init\` with \`-b $available_ref_or_commit\`(tag: $ref_or_commit)"
        fi

        mkdir -p "$directory"
        cd "$directory" # cd {

        local manifest_branch_arg
        manifest_branch_arg=$(if [ -n "$available_ref_or_commit" ]; then echo "-b $available_ref_or_commit"; fi)
        local depth_arg
        depth_arg=$(if [ -n "$depth" ]; then echo "--depth $depth"; fi)
        local manifest_name_arg
        manifest_name_arg=$(if [ -n "$manifest_name" ]; then echo "-m $manifest_name"; fi)

        repo init -u "$manifest_url" $manifest_branch_arg $depth_arg $manifest_name_arg
        repo forall --ignore-missing -ve -c sh -c 'pwd && git checkout . && git clean -df' # when no sh -c ..., this command may fail on windows & macOS.
        if [ "$(uname)" = 'Darwin' ]; then
          repo sync -d --force-sync --force-remove-dirty --prune -j $(sysctl -n hw.physicalcpu)
        else
          repo sync -d --force-sync --force-remove-dirty --prune -j $(nproc)
        fi

        cd $OLDPWD # } cd
      }

      st_repo_info() {
        local repo_root=${1:-.}
        cd "$repo_root" # cd {

        if (uname | grep -qE '^MINGW'); then
          local drive_symbol
          drive_symbol=$(repo info | grep -oE 'path: +[A-Z]:' | grep -oE '[A-Z]' | uniq | head -n 1 | tr A-Z a-z)
          repo info | sed -E "s/path: +[A-Z]:/path: \/$drive_symbol/g" | sed -E -e '\|Local Branches|d' -e "s|$PWD/||g" -e 's|\x1B\[[0-9;]*[JKmsu]||g'
        else
          repo info | sed -E -e '\|Local Branches|d' -e "s|$PWD/||g" -e 's|\x1B\[[0-9;]*[JKmsu]||g'
        fi

        cd $OLDPWD # } cd
      }

      # module: ssh
      st_ssh_write_private_key() {
        local key_type=${2:-rsa} # dsa | ecdsa | ed25519 | rsa
        local key_filename=${3:-id_${key_type}}

        # protect `key_content`
        local print_commands
        print_commands=$(if echo "$-" | grep -q 'x'; then echo 'true'; fi)
        if [ -n "$print_commands" ]; then set +x; fi

        local key_content=${1:?Missing argument \`\$1 - key_content\` when calling st_ssh_write_private_key.}

        mkdir -p $HOME/.ssh
        chmod 700 $HOME/.ssh

        if ! (echo "$key_content" | grep -Eq -- '-----BEGIN'); then
          local decoded_content="$(echo "$key_content" | base64 -d 2>/dev/null)"

          if ! (echo "$decoded_content" | grep -Eq -- '-----BEGIN'); then
            st_log_error "Invalid ssh private key content."
            if [ -n "$print_commands" ]; then set -x; fi
            return 1
          fi

          key_content="$decoded_content"
        fi

        local key_file="$HOME/.ssh/${key_filename}"
        if [ -f "$key_file" ]; then
          mv "$key_file" "${key_file}.backup.$(date +%s)"
        fi

        echo "$key_content" >"$key_file"
        chmod 600 "$key_file"

        if [ -n "$print_commands" ]; then set -x; fi
      }

