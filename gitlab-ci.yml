            rm -rf "$project_dir/$derived_data"
          else
            rm -rf "$project_dir/$derived_data/Build"
            rm -rf "$project_dir/$derived_data/Logs"
            rm -rf "$project_dir/$derived_data/info.plist"
            rm -rf "$project_dir/$derived_data/Archives"
            rm -rf "$project_dir/$derived_data/Frameworks"
          fi
        done
