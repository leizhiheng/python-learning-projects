        fi

        st_build_android_gradle_build "." "." "$g_gradle_task" "lawnmower/app" true
      done

      if [ "$PCI_IJIAMI_ENCRYPT" = 'true' ]; then
        st_gitlab_install_command \
          'https://gitlab.ubtrobot.com/rosa-dev/external-tools/-/raw/ijiami/encryptiontool/encryptionTool-v4.3.2-202308/encryptionTool-v4.3.2-202308.jar' \
          '.ci-tmp/encrypt' \
          'encryption-tool.jar' \
          "$CI_API_V4_URL" \
          "$machine_user_gitlab_token"
        g_encryption_tool='.ci-tmp/encrypt/encryption-tool.jar'

      encrypt_apk_by_ijiami() {
          local input_apk=$1
          local output_dir=$2
          local plan_id=$3

          java -jar "$g_encryption_tool" \
            -t apk \
            -u "http://10.10.84.27/common" \
            -r "ubtech" \
            -w "$ijiami_aab_service_password" \
            -k "$input_apk" \
            -s "$plan_id" \
            -d ".ci-tmp/encrypt"

          # See https://developer.android.com/studio/build/building-cmdline#sign_cmdline
          local encrypted_unsigned_apk=".ci-tmp/encrypt/$(basename "$input_apk" | sed -E 's/\.(apk)$/_unsigned.\1/g')"
          local encrypted_unsigned_aligned_apk=$(echo "$encrypted_unsigned_apk" | sed -E 's/\.(apk)$/_aligned.\1/g')

          $ANDROID_SDK_ROOT/build-tools/$(ls -1 $ANDROID_SDK_ROOT/build-tools | tail -n 1)/zipalign -v -p 4 \
            "$encrypted_unsigned_apk" \
            "$encrypted_unsigned_aligned_apk"

          # protect `ks-pass`
          local print_commands=$(echo "$-" | grep 'x')
          if [ -n "$print_commands" ]; then set +x; fi

          $ANDROID_SDK_ROOT/build-tools/$(ls -1 $ANDROID_SDK_ROOT/build-tools | tail -n 1)/apksigner sign \
            --ks "./gradle-shared/keystores/for-apk-encrypting.jks" \
            --ks-key-alias "ROSA" \
            --ks-pass "pass:$(echo "$rosa_android_jks_store_password" | base64 -d -)" \
            --in "$encrypted_unsigned_aligned_apk" \
            --out "$output_dir/$(basename "$input_apk" | sed -E 's/\.(apk)/-encrypted.\1/g')"

          if [ -n "$print_commands" ]; then set -x; fi
        }

      encrypt_aab_by_ijiami() {
          local input_aab=$1
          local output_dir=$2
          local plan_id=$3

          java -jar "$g_encryption_tool" \
            -t aab \
            -u "http://10.10.84.27/common" \
            -r "ubtech" \
            -w "$ijiami_aab_service_password" \
            -k "$input_aab" \
            -s "$plan_id" \
            -d ".ci-tmp/encrypt"

          local encrypted_unsigned_aab=".ci-tmp/encrypt/$(basename "$input_aab" | sed -E 's/\.(aab)$/_encrypt.\1/g')"

          # protect `storepass`
          local print_commands=$(echo "$-" | grep 'x')
          if [ -n "$print_commands" ]; then set +x; fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -storepass "$(echo "$rosa_android_gu_jks_store_password" | base64 -d -)" \
            -keystore "./gradle-shared/keystores/for-aab-encrypting.jks" \
            -signedjar "$output_dir/$(basename "$input_aab" | sed -E 's/\.(aab)/-encrypted.\1/g')" \
            "$encrypted_unsigned_aab" \
            "ROSA GU"

          if [ -n "$print_commands" ]; then set -x; fi
        }

        encrypt_apk_or_aab_by_ijiami() {
          local filename_regex=$1
          local plan_id=$2

          local app=$(
            [ -d "." ] && \
            (
              find "." -maxdepth 1 -type d \
                | (grep -E "/[rR]elease$" || true) \
                | st_compatible_xargs_i_r " \
                  find \"{}\" -type f \
                    | (grep -E \"/$filename_regex$\" || true)
                "
            )
          )

          if [ -z "$app" ]; then
            st_log_warn "No app to be encrypted can be found through the \`$filename_regex\` regex."
            return 0
          fi

          if [ "$(echo -n "$app" | wc -l)" -gt 1 ]; then
            echo "$app"
            st_log_error "Multiple apps above to be encrypted can be found through the \`$filename_regex\` regex."
            return 1
          fi

          if (echo "$app" | grep -E '\.apk$'); then
            encrypt_apk_by_ijiami "$app" "$(dirname "$app")" "$plan_id"
            return $?
          fi

          if (echo "$app" | grep -E '\.aab$'); then
            encrypt_aab_by_ijiami "$app" "$(dirname "$app")" "$plan_id"
            return $?
          fi

          st_log_warn "The \`$app\` app to be encrypted does not match the \`$filename_regex\` regex. Check the \`regex\` config."
          return 1
        }

        encrypt_apk_or_aab_by_ijiami "lawn-mower-local\.apk" "UMower"
        encrypt_apk_or_aab_by_ijiami "lawn-mower-local\.aab" "UMowerAab"
      fi

      g_artifact_types="apk aab apk.idsig jar aar tar.gz zip"

      # rename filenames with version and build number for artifact files
      [ -d "." ] \
      && (
        suffix_regex="($(echo "$g_artifact_types" | sed -E -e 's/^ +//g' -e 's/ +$//g' -e 's/ +/|/g'))" \
        && find "." -maxdepth 1 -type d \
        | (grep -E "/([dD]ebug|[rR]elease|[rR]eports)$" || true) \
        | st_compatible_xargs_i_r "find \"{}\" -type f \
          | (grep -iE '\.$suffix_regex$' || true)" \
        | st_compatible_xargs_i_r "
          src=\"{}\" \
          && dest=\$(echo \"\$src\" | sed -E \"s/\\.$suffix_regex$/-$g_version-BUILD.$g_build_number.\\1/g\") \
          && mv \"\$src\" \"\$dest\"
        "
      )

      # recalculate sha256sum for artifact files
      [ -d "." ] \
        && rm -rf "./sha256sum.txt" \
        && find "." -maxdepth 1 -type d \
        | (grep -E "/([dD]ebug|[rR]elease|[rR]eports)$" || true) \
        | st_compatible_xargs_i_r "find \"{}\" -type f \
          | sed -E 's/^\.\///g'" \
        | st_compatible_xargs_i_r 'sha256sum "{}" >> "./sha256sum.txt"'

      st_build_save_incremental_build_number ".ci-tmp/build-numbers"
  artifacts:
    paths:
      - '[dD]ebug/'
      - '[rR]elease/'
      - '[rR]eports/'
      - '*repo-info.txt'
      - '*head-manifest.xml'
      - '*sha256sum.txt'
      - __args__
    when: always
  cache:
    key: $CI_PROJECT_PATH_SLUG
    paths:
      - .ci-cache
  rules:
    - if: $PCI_VARIANT == "official" && $CI_PIPELINE_SOURCE =~ /(web|schedule)/
stalco:
  stage: build
  tags:
    - rosa
    - linux
  image:
    name: rosa/android-sdk:36-20250715
    entrypoint:
      - ""
  variables:
    GIT_CHECKOUT: "false"
    GIT_STRATEGY: none
  script:
    - |-
      set -xeo pipefail

      # sourced modules
      # module: build
      st_build_semver_regex='(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(rc|alpha|beta)\.([1-9][0-9]*)){0,1}'

      st_build_check_semver() {
        local version=${1:?Missing argument \`\$1 - version\` when calling st_build_check_semver.}
        if (echo "$version" | grep -Eq "^$st_build_semver_regex$"); then
          return 0
        else
          st_log_error "Illegal semantic version. Should meet this regex: \`^$st_build_semver_regex$\`."
          return 1
        fi
      }

      st_build_check_semver_in_text_file() {
        local text_file=${1:?Missing argument \`\$1 - text_file\` when calling st_build_check_semver_in_text_file.}
        local version_line_regex=${2-.*}

        local count
        let count=$(grep -E "$version_line_regex" "$text_file" | grep -cE "$st_build_semver_regex" || true)
        if [ $count -eq 1 ]; then
          return 0
        fi

        if [ $count -eq 0 ]; then
          st_log_error "A semantic-version is not found in \`$text_file\`."
        else
          st_log_error "Multiple semantic-versions are found in \`$text_file\`."
        fi
        return 1
      }

      st_build_read_semver_from_text_file() {
        local text_file=${1:?Missing argument \`\$1 - text_file\` when calling st_build_read_semver_from_text_file.}
        local version_line_regex=${2-.*}

        st_fs_read_string_from_text_file "$text_file" "$st_build_semver_regex" "$version_line_regex"
      }

      st_build_bump_semver() {
        local current=${1:?Missing argument \`\$1 - current\` when calling st_build_bump_semver.}
        local increment_version=${2:?Missing argument \`\$2 - increment_version\` when calling st_build_bump_semver.}

        # PATCH/MINOR/MAJOR
        local major minor patch
        let major=$(echo "$current" | awk -F '.' '{print $1}') || :
        let minor=$(echo "$current" | awk -F '.' '{print $2}') || :
        let patch=$(echo "$current" | awk -F '.' '{print $3}') || :

        if [ "$increment_version" = "MAJOR" ]; then
          let major=major+1 || :
          let minor=0 || :
          let patch=0 || :
        elif [ "$increment_version" = "MINOR" ]; then
          let minor=minor+1 || :
          let patch=0 || :
        elif [ "$increment_version" = "PATCH" ]; then
          let patch=patch+1 || :
        else
          st_log_error "Illegal \`current\` version: $current."
          return 1
        fi

        echo "$major.$minor.$patch"
      }

      st_build_prepare_build_numbers_repo() {
        local repository=${1:?Missing argument \`\$1 - repository\` when calling st_build_prepare_build_numbers_repo.}
        local branch=${2:?Missing argument \`\$2 - branch\` when calling st_build_prepare_build_numbers_repo.}
        local directory=${3:?Missing argument \`\$3 - directory\` when calling st_build_prepare_build_numbers_repo.}

        rm -rf "$directory"
        if (git ls-remote "$repository" | grep -Eq "refs/heads/$branch$"); then
          git clone -b "$branch" --depth 1 "$repository" "$directory"
        else
          git init "$directory"
          git -C "$directory" remote add origin "$repository"

          touch "$directory/BUILD_NUMBER"
          git -C "$directory" add -A
          git -C "$directory" commit -m 'add an empty BUILD_NUMBER file'
          git -C "$directory" branch -m "$branch"
        fi
      }

      st_build_cal_incremental_build_number() {
        local repo_dir=${1:?Missing argument \`\$1 - repo_dir\` when calling st_build_cal_incremental_build_number.}

        if [ -s "$repo_dir/BUILD_NUMBER" ]; then
          local current incremental
          let current=$(cat "$repo_dir/BUILD_NUMBER" | head -n 1) || [ -n "$current" ]
          if [ $current -le 0 ]; then
            st_log_error "Illegal build number in \`$repo_dir/BUILD_NUMBER\` which <= 0."
            return 1
          fi

          let incremental=current+1
          echo "$incremental"
        else
          echo "1"
        fi
      }

      st_build_save_incremental_build_number() {
        local repo_dir=${1:?Missing argument \`\$1 - repo_dir\` when calling st_build_save_incremental_build_number.}

        local incremental
        let incremental=$(st_build_cal_incremental_build_number "$repo_dir")
        echo "$incremental" >"$repo_dir/BUILD_NUMBER"

        git -C "$repo_dir" add 'BUILD_NUMBER'
        git -C "$repo_dir" commit -m "build-number: $incremental"
        git -C "$repo_dir" push origin "HEAD:refs/heads/$(git -C "$repo_dir" rev-parse --abbrev-ref HEAD)"
      }

      st_build_conan_add_or_update_remote() {
        local remote_name=${1:?Missing argument \`\$1 - remote_name\` when calling st_build_conan_add_or_update_remote.}
        local remote_url=${2:?Missing argument \`\$2 - remote_url\` when calling st_build_conan_add_or_update_remote.}

        if (echo "$remote_url" | grep -Eq '^http://'); then
          conan remote add -f "$remote_name" "$remote_url" False
        else
          conan remote add -f "$remote_name" "$remote_url"
        fi
      }

      st_build_conan_user() {
        local remote=${1:?Missing argument \`\$1 - remote\` when calling st_build_conan_user.}
        local name=${2:?Missing argument \`\$2 - name\` when calling st_build_conan_user.}

        # protect `password`
        local print_commands
        print_commands=$(if echo "$-" | grep -q 'x'; then echo 'true'; fi)
        if [ -n "$print_commands" ]; then set +x; fi

        local password=${3:?Missing argument \`\$3 - password\` when calling st_build_conan_user.}
        conan user "$name" -r "$remote" -p "$password"

        if [ -n "$print_commands" ]; then set -x; fi
      }

      st_build_conan_install() {
        local project_dir=${1:-.}
        local install_dir=${2:-build}
        local profile_host=${3:-}
        local other_args=
        shift 3 2>/dev/null && other_args=$@

        if [ -z "$profile_host" ]; then
          sh -c "conan install \"$project_dir\" -if \"$install_dir\" $other_args"
        else
          sh -c "conan install \"$project_dir\" -if \"$install_dir\" -pr \"$profile_host\" $other_args"
        fi

        . "$install_dir"/activate.sh
      }

      st_build_cmake_generate() {
        local project_dir=${1:-.}
        local build_dir=${2:-build}
        local install_dir=${3:-out}
        local generator=${4:-Unix Makefiles}
        local build_type=${5:-Debug}

        local install_dir_arg="-DCMAKE_INSTALL_PREFIX=$install_dir"
        local generator_arg="-G$generator"

        if [ "Unix Makefiles" = "$generator" ]; then
          cmake -S "$project_dir" -B "$build_dir" "$install_dir_arg" "$generator_arg" "-DCMAKE_BUILD_TYPE=$build_type"
        else
          cmake -S "$project_dir" -B "$build_dir" "$install_dir_arg" "$generator_arg"
        fi
      }

      st_build_cmake_build() {
        local build_dir=${1:-build}
        local build_config=${2:-}

        local job_count=
        if [ "$(uname)" = 'Darwin' ]; then
          job_count=$(sysctl -n hw.physicalcpu)
        else
          job_count=$(nproc)
        fi

        if [ -z "$build_config" ]; then
          cmake --build "$build_dir" -j "$job_count"
        else
          cmake --build "$build_dir" -j "$job_count" --config "$build_config"
        fi
      }

      st_build_cmake_install() {
        local build_dir=${1:-build}

        cmake --build "$build_dir" --target install
      }

      st_build_gradle_add_property() {
        local name=${1:?Missing argument \`\$1 - name\` when calling st_build_gradle_add_property.}
        local value=${2:?Missing argument \`\$2 - value\` when calling st_build_gradle_add_property.}

        local gradle_user_home=${GRADLE_USER_HOME:-$HOME/.gradle}
        mkdir -p "$gradle_user_home"

        local gradle_property_file="$gradle_user_home/gradle.properties"
        touch "$gradle_property_file"

        if (grep -Eq "$name=" "$gradle_property_file"); then
          sed -i --follow-symlinks "s/.*$name=.*/$name=$value/g" "$gradle_property_file"
        else
          echo "$name=$value" >>"$gradle_property_file"
        fi
      }

      st_build_android_gradle_build() {
        local project_dir=${1:-.}
        local out_dir=${2:-out}
        local build_task=${3:-assemble}
        local gradle_project_dir=${4:-}
        local gen_mapping_and_symbols=${5:-false}

        gradle_project_dir=$(echo "$gradle_project_dir" | sed -E 's/^(\.$|\.\/+)//g')
        local gradle_project_dir_rel_to_run_dir="$project_dir$([ -n "$gradle_project_dir" ] && echo "/$gradle_project_dir")"
        sh "$project_dir/gradlew" --parallel -p "$gradle_project_dir_rel_to_run_dir" "$build_task"

        local file_map=
        check_same_name() {
          local generated_file=${1:?Missing argument \`\$1 - generated_file\` when calling check_same_name.}
          local output_file=${2:?Missing argument \`\$2 - output_file\` when calling check_same_name.}

          echo "$output_file:$generated_file"

          local existing
          existing=$(echo "$file_map" | (grep -E "^$output_file:" || true) | awk -F ':' '{print $2}')
          if [ -n "$existing" ]; then
            st_log_error "Built a file with the same name(\`$(echo "$output_file" | sed -E 's/\-(debug|release)\.(apk|aab|jar)/\.\2'/g)\`) in different gradle tasks."
            return 1
          fi

          file_map="$file_map
      $output_file:$generated_file"
        }

        local old_ifs=$IFS
        IFS=$'\n'
        local artifact
        for artifact in $(
          find "$gradle_project_dir_rel_to_run_dir" \
            -name '*\.apk' -o -name '*\.aab' -o -name '*\.jar' |
            grep -E '/build/(outputs/(apk|bundle)/|libs/.*jar)' || true
        ); do
          IFS=$old_ifs

          check_same_name "$artifact" "$(basename "$artifact" | sed -E 's/-release\.(apk|aab|jar)$/\.\1/g')"

          if (echo "$artifact" | grep -qE '\-debug\.(apk|aab|jar)'); then
            mkdir -p "$out_dir/debug"
            mv "$artifact" "$out_dir/debug"
            continue
          fi

          mkdir -p "$out_dir/release"

          if [ "$gen_mapping_and_symbols" == 'true' ]; then
            local variant
            variant=$(echo "$artifact" | awk -F '/build/outputs/apk/' '{print $2}' | awk -F '/' '{print $1}')
            if [ "$variant" != "release" ]; then
              variant="${variant}Release"
            fi

            local module_path
            module_path=$(echo "$artifact" | sed -E 's/(.*)\/build\/(outputs|libs)\/.*/\1/g')

            if [ -d "$module_path/build/outputs/mapping/$variant" ]; then
              local filename
              filename=$(basename "$artifact" | sed -E 's/(\-release)?.(apk|aab|jar)$//g')

              tar czvf "$out_dir/release/$filename-mapping.tar.gz" \
                -C "$module_path/build/outputs/mapping/$variant" \
                $(ls "$module_path/build/outputs/mapping/$variant")

              if [ -f "$module_path/build/outputs/native-debug-symbols/$variant/native-debug-symbols.zip" ]; then
                mv "$module_path/build/outputs/native-debug-symbols/$variant/native-debug-symbols.zip" \
                  "$out_dir/release/$filename-native-debug-symbols.zip"
              fi
            fi
          fi

          mv "$artifact" "$out_dir/release/$(basename "$artifact" | sed -E 's/-release\.(apk|aab|jar)$/\.\1/g')"
          continue
        done

        unset check_same_name
      }

      st_build_gradle_lint() {
        local project_dir=${1:-.}
        local out_dir=${2:-out}
        local gradle_sub_project=${3:-}
        local gradle_project_dir=${4:-}

        gradle_sub_project=$(echo "$gradle_sub_project" | sed -E 's/^:*/:/g' | sed -E 's/:*$//g')
        gradle_project_dir=$(echo "$gradle_project_dir" | sed -E 's/^(\.$|\.\/+)//g')
        local gradle_project_dir_rel_to_run_dir="$project_dir$([ -n "$gradle_project_dir" ] && echo "/$gradle_project_dir")"

        local gradle_sub_projects_to_lint=
        if [ -z "$gradle_sub_project" ]; then
          gradle_sub_projects_to_lint=$(
            sh "$project_dir/gradlew" -p "$gradle_project_dir_rel_to_run_dir" projects |
              (grep -E ' *.?--- Project ' || true) |
              sed -E 's/.*--- Project //g' |
              awk -F "'" '{print $2}' |
              sort |
              uniq
          )

          # `$gradle_sub_projects_to_lint` has no value when `$gradle_project_dir` has no sub-projects.
        fi

        if [ -z "$gradle_sub_projects_to_lint" ]; then
          gradle_sub_projects_to_lint=$(
            echo "$gradle_sub_project" &&
              sh "$project_dir/gradlew" -p "$gradle_project_dir_rel_to_run_dir" "$([ -n "$gradle_sub_project" ] && echo "$gradle_sub_project":)"dependencies |
                (grep -E ' *\.?--- project ' || true) |
                sed -E 's/.*--- project //g' |
                (grep -Ev ' (\(.?\)|FAILED)$' || true) |
                sed -E '/^$/d' |
                sort | uniq
          )
        fi

        if [ -z "$gradle_sub_projects_to_lint" ]; then
          st_log_error "No lintable gradle sub-projects found."
          return 1
        fi

        local reports_dir="$project_dir/build/reports/$(date +%s | md5sum | awk '{print $1}' | cut -c 1-7)"
        local lint_results_dir="$reports_dir/lint-results"
        mkdir -p "$lint_results_dir"

        local gradle_sub_project_to_lint
        local result_summary=
        local lint_result_files=
        local ret
        let ret=0 || :

        for gradle_sub_project_to_lint in $gradle_sub_projects_to_lint; do
          local module_dir="$(echo "$gradle_sub_project_to_lint" | sed -E 's/:/\//g' | sed -E 's/^\///g')"

          if ! ([ -f "$project_dir/$module_dir/build.gradle" ] || [ -f "$project_dir/$module_dir/build.gradle.kts" ]); then
            continue
          fi

          echo "Execute lint task for \`$gradle_sub_project_to_lint\`."
          if sh "$project_dir/gradlew" --parallel -p "$gradle_project_dir_rel_to_run_dir" "$gradle_sub_project_to_lint":lintRelease; then
            result_summary="$result_summary
      $gradle_sub_project_to_lint --- pass"
          else
            if ! [ -f "$project_dir/$module_dir/build/reports/lint-results-release.html" ]; then
              result_summary="$result_summary
      $gradle_sub_project_to_lint --- fail(build)"
              continue
            fi

            result_summary="$result_summary
      $gradle_sub_project_to_lint --- fail"
            let ret=1
          fi

          local dest_filename="$(echo "$module_dir" | sed -E 's/\//-/g')-lint-results.html"
          cp "$project_dir/$module_dir/build/reports/lint-results-release.html" "$lint_results_dir/$dest_filename"
          lint_result_files="$lint_result_files
      lint-results/$dest_filename"
        done

        echo "$result_summary" | column -t | tee "$reports_dir/lint-result-summary.txt"

        local filename_prefix
        if [ -n "$gradle_sub_project" ]; then
          filename_prefix="$(echo "$gradle_sub_project" | sed -E 's/:+/-/g' | sed -E 's/^-+//g')-"
        elif [ -n "$gradle_project_dir" ]; then
          filename_prefix="$(echo "$gradle_project_dir" | sed -E 's/\//-/g' | sed -E 's/\-+$//g')-"
        else
          filename_prefix=
        fi

        mkdir -p "$out_dir"
        echo "lint-result-summary.txt
      $lint_result_files" | tar -C "$reports_dir" -czvf "$out_dir/${filename_prefix}reports-android-lint.tar.gz" --files-from -

        return $ret
      }

      st_build_swift_lint() {
        local project_dir=${1:-.}
        local out_dir=${2:-out}
        local config_file=${3:-}
        local config_file_arg

        if [ -n "$config_file" ]; then
          if ! [ -f "$project_dir/$config_file" ]; then
            st_log_error "No \`$project_dir/$config_file\` file was found."
            return 1
          fi

          config_file_arg="--config $project_dir/$config_file"
        else
          config_file=".swiftlint.yml"

          if [ -f "$project_dir/$config_file" ]; then
            config_file_arg="--config $project_dir/$config_file"
          else
            st_log_warn "It is recommended to add a \`$project_dir/.swiftlint.yml\` file."
            config_file_arg=
          fi
        fi

        mkdir -p "$out_dir"
        swiftlint lint $config_file_arg --reporter "html" --no-cache --strict "$project_dir" >"$out_dir/swift-lint-results.html"
      }

      st_build_xcode_build() {
        local project_dir=${1:-.}
        local out_dir=${2:-out}
        local xcodegen_yml=${3:-project.yml}
        local scheme=${4:-}
        local file_filter_regex=${5:-.*}
        local export_for_app_store=${6:-false}

        local xcodeproj_name
        xcodeproj_name=$(cat "$project_dir/$xcodegen_yml" | (grep -Eo '^ *name: *[0-9a-zA-Z_\-]+ *$' || true) | awk -F ' ' '{print $2}')
        if [ -z "$xcodeproj_name" ]; then
          st_log_error "Illegal xcodeproj name. Check your \`$$project_dir/$xcodegen_yml\` file."
          return 1
        fi

        rm -rf "$project_dir/$xcodeproj_name.xcodeproj"
        xcodegen --spec "$project_dir/$xcodegen_yml" --project "$project_dir"

        mkdir -p "$project_dir/DerivedData-$xcodeproj_name"
        local derived_data_path
        derived_data_path=$(cd "$project_dir/DerivedData-$xcodeproj_name" && pwd)

        if [ -z "$scheme" ]; then
          scheme=$xcodeproj_name
        fi

        print_product_bundle_package_type() {
          xcrun xcodebuild \
            -derivedDataPath "$derived_data_path" \
            -project "$project_dir/$xcodeproj_name.xcodeproj" \
            -scheme "$scheme" \
            -showBuildSettings 2>/dev/null |
            (grep -Eo 'PRODUCT_BUNDLE_PACKAGE_TYPE = .*' || true)
        }

        local product_bundle_package_type
        product_bundle_package_type=$(print_product_bundle_package_type)
        unset print_product_bundle_package_type

        mkdir -p "$out_dir/Release"

        if (echo "$product_bundle_package_type" | grep -qE ' FMWK$'); then
          xcrun xcodebuild \
            -derivedDataPath "$derived_data_path" \
            -project "$project_dir/$xcodeproj_name.xcodeproj" \
            -scheme "$scheme" \
            -configuration Release \
            -destination 'generic/platform=iOS' |
            xcbeautify

          local frameworks_and_bundles
          frameworks_and_bundles=$(
            ls -1 "$derived_data_path/Build/Products/Release-iphoneos" |
              (grep -E "^$file_filter_regex\.(framework|bundle)$" || true)
          )
          if [ -z "$frameworks_and_bundles" ]; then
            st_log_error "No frameworks or bundles found after filtering by the \`$file_filter_regex\` regex."
            return 1
          fi

          local framework
          local framework_name
          local swift_header_dir
          local swift_header_file
          for framework in $(echo "$frameworks_and_bundles" | grep -E '\.framework$' || true); do
            framework_name=$(echo "$framework" | sed -E 's/\.framework$//g')
            swift_header_dir="$derived_data_path/Build/Products/Release-iphoneos/$framework/Headers"
            swift_header_file="$derived_data_path/Build/Intermediates.noindex/$xcodeproj_name.build/Release-iphoneos/$framework_name.build/DerivedSources/$framework_name-Swift.h"
            if (! [ -d "$swift_header_dir" ]) && [ -f "$swift_header_file" ]; then
              mkdir -p "$swift_header_dir"
              cp -f "$swift_header_file" "$swift_header_dir"
            fi

            echo "swift_header_dir: $swift_header_dir"
            echo "swift_header_file: $swift_header_file"
          done

          echo "$frameworks_and_bundles" |
            xargs tar -C "$derived_data_path/Build/Products/Release-iphoneos" -czvf "$out_dir/Release/$scheme-frameworks.tar.gz" --files-from -

          ls -1 "$derived_data_path/Build/Products/Release-iphoneos" |
            (grep -E "^$file_filter_regex\.framework.dSYM$" || true) |
            st_compatible_xargs_i_r tar -C "$derived_data_path/Build/Products/Release-iphoneos" -czvf "$out_dir/Release/$scheme-framework-dSYMs.tar.gz" --files-from -

          return $?
        fi

        if ! (echo "$product_bundle_package_type" | grep -qE ' APPL$'); then
          st_log_error "Unsupported PRODUCT_BUNDLE_PACKAGE_TYPE: $product_bundle_package_type"
          return 1
        fi

        mkdir -p "$derived_data_path/Archives"
        xcrun xcodebuild \
          -derivedDataPath "$derived_data_path" \
          -project "$project_dir/$xcodeproj_name.xcodeproj" \
          -scheme "$scheme" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          -archivePath "$derived_data_path/Archives/$scheme.xcarchive" \
          archive | xcbeautify

        st_build_xcode_export_ipa() {
          local xcarchive_file=${1:?Missing argument \`\$1 - xcarchive_file\` when calling st_build_xcode_export_ipa.}
          local export_method=${2:?Missing argument \`\$2 - export_method\` when calling st_build_xcode_export_ipa.} # xcodebuild --help

          local plist_file="$derived_data_path/Archives/ExportOptions-$export_method.plist"
          cat >"$plist_file" <<EOF
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
        <dict>
          <key>method</key>
          <string>$export_method</string>
        </dict>
      </plist>
      EOF

          rm -rf "$derived_data_path/Archives/ExportedIpa-$export_method"
          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist "$plist_file" \
            -allowProvisioningUpdates \
            -archivePath "$xcarchive_file" \
            -exportPath "$derived_data_path/Archives/ExportedIpa-$export_method" |
            xcbeautify
          mv "$derived_data_path/Archives/ExportedIpa-$export_method"/*.ipa "$out_dir/Release/$scheme-$(echo "$export_method" | sed 's/-/_/g').ipa"
        }

        tar -C "$derived_data_path/Archives/$scheme.xcarchive/dSYMs" -czvf "$out_dir/Release/$scheme.app.dSYM.tar.gz" $scheme.app.dSYM

        st_build_xcode_export_ipa "$derived_data_path/Archives/$scheme.xcarchive" 'development'
        if [ "$export_for_app_store" = 'true' ]; then
          st_build_xcode_export_ipa "$derived_data_path/Archives/$scheme.xcarchive" 'app-store'
        fi

        unset st_build_xcode_export_ipa
      }

      st_build_xcode_clean() {
        local project_dir=${1:-.}
        local clean_cache=${2:-false}

        local derived_data
        for derived_data in $(ls -1 "$project_dir" | (grep -E 'DerivedData.*' || true)); do
