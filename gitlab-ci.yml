      fi

      for g_gradle_task in $g_gradle_tasks; do
        if (echo "$g_gradle_task" | grep -qE ':?bundle.*$'); then
          if [ "$PCI_AAB" != 'true' ]; then
            continue
          fi

          st_log_info "Change the keystore(aab) for \`ROSA GU\`(KeyAlias)."
          cat > "./gradle-shared/keystores/keystore.properties" <<EOF
      keyAlias=ROSA GU
      storePassword=$(echo "$rosa_android_gu_jks_store_password" | base64 -d -)
      keyPassword=$(echo "$rosa_android_gu_jks_store_password" | base64 -d -)
      EOF

          echo "$rosa_android_gu_jks" | base64 -d - > "./gradle-shared/keystores/keystore.jks"
          cp "./gradle-shared/keystores/keystore.jks" "./gradle-shared/keystores/for-aab-encrypting.jks"
        else
          st_log_info "Change the keystore for \`ROSA\`(KeyAlias)."
          cat > "./gradle-shared/keystores/keystore.properties" <<EOF
      keyAlias=ROSA
      storePassword=$(echo "$rosa_android_jks_store_password" | base64 -d -)
      keyPassword=$(echo "$rosa_android_jks_store_password" | base64 -d -)
      EOF

          echo "$rosa_android_jks" | base64 -d - > "./gradle-shared/keystores/keystore.jks"
          cp "./gradle-shared/keystores/keystore.jks" "./gradle-shared/keystores/for-apk-encrypting.jks"
        fi

        st_build_android_gradle_build "." "." "$g_gradle_task" "lawnmower/app" true
      done

      if [ "$PCI_IJIAMI_ENCRYPT" = 'true' ]; then
        st_gitlab_install_command \
          'https://gitlab.ubtrobot.com/rosa-dev/external-tools/-/raw/ijiami/encryptiontool/encryptionTool-v4.3.2-202308/encryptionTool-v4.3.2-202308.jar' \
          '.ci-tmp/encrypt' \
          'encryption-tool.jar' \
          "$CI_API_V4_URL" \
          "$machine_user_gitlab_token"
        g_encryption_tool='.ci-tmp/encrypt/encryption-tool.jar'

      encrypt_apk_by_ijiami() {
          local input_apk=$1
          local output_dir=$2
          local plan_id=$3

          java -jar "$g_encryption_tool" \
            -t apk \
            -u "http://10.10.84.27/common" \
            -r "ubtech" \
            -w "$ijiami_aab_service_password" \
            -k "$input_apk" \
            -s "$plan_id" \
            -d ".ci-tmp/encrypt"

          # See https://developer.android.com/studio/build/building-cmdline#sign_cmdline
          local encrypted_unsigned_apk=".ci-tmp/encrypt/$(basename "$input_apk" | sed -E 's/\.(apk)$/_unsigned.\1/g')"
          local encrypted_unsigned_aligned_apk=$(echo "$encrypted_unsigned_apk" | sed -E 's/\.(apk)$/_aligned.\1/g')

          $ANDROID_SDK_ROOT/build-tools/$(ls -1 $ANDROID_SDK_ROOT/build-tools | tail -n 1)/zipalign -v -p 4 \
            "$encrypted_unsigned_apk" \
            "$encrypted_unsigned_aligned_apk"

          # protect `ks-pass`
          local print_commands=$(echo "$-" | grep 'x')
          if [ -n "$print_commands" ]; then set +x; fi

          $ANDROID_SDK_ROOT/build-tools/$(ls -1 $ANDROID_SDK_ROOT/build-tools | tail -n 1)/apksigner sign \
            --ks "./gradle-shared/keystores/for-apk-encrypting.jks" \
            --ks-key-alias "ROSA" \
            --ks-pass "pass:$(echo "$rosa_android_jks_store_password" | base64 -d -)" \
            --in "$encrypted_unsigned_aligned_apk" \
            --out "$output_dir/$(basename "$input_apk" | sed -E 's/\.(apk)/-encrypted.\1/g')"

          if [ -n "$print_commands" ]; then set -x; fi
        }

      encrypt_aab_by_ijiami() {
          local input_aab=$1
          local output_dir=$2
          local plan_id=$3

          java -jar "$g_encryption_tool" \
            -t aab \
            -u "http://10.10.84.27/common" \
            -r "ubtech" \
            -w "$ijiami_aab_service_password" \
            -k "$input_aab" \
            -s "$plan_id" \
            -d ".ci-tmp/encrypt"

          local encrypted_unsigned_aab=".ci-tmp/encrypt/$(basename "$input_aab" | sed -E 's/\.(aab)$/_encrypt.\1/g')"

          # protect `storepass`
          local print_commands=$(echo "$-" | grep 'x')
          if [ -n "$print_commands" ]; then set +x; fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -storepass "$(echo "$rosa_android_gu_jks_store_password" | base64 -d -)" \
            -keystore "./gradle-shared/keystores/for-aab-encrypting.jks" \
            -signedjar "$output_dir/$(basename "$input_aab" | sed -E 's/\.(aab)/-encrypted.\1/g')" \
            "$encrypted_unsigned_aab" \
            "ROSA GU"

          if [ -n "$print_commands" ]; then set -x; fi
        }

        encrypt_apk_or_aab_by_ijiami() {
          local filename_regex=$1
          local plan_id=$2

          local app=$(
            [ -d "." ] && \
            (
              find "." -maxdepth 1 -type d \
                | (grep -E "/[rR]elease$" || true) \
                | st_compatible_xargs_i_r " \
                  find \"{}\" -type f \
                    | (grep -E \"/$filename_regex$\" || true)
                "
            )
          )

          if [ -z "$app" ]; then
            st_log_warn "No app to be encrypted can be found through the \`$filename_regex\` regex."
            return 0
          fi

          if [ "$(echo -n "$app" | wc -l)" -gt 1 ]; then
            echo "$app"
            st_log_error "Multiple apps above to be encrypted can be found through the \`$filename_regex\` regex."
            return 1
          fi

          if (echo "$app" | grep -E '\.apk$'); then
            encrypt_apk_by_ijiami "$app" "$(dirname "$app")" "$plan_id"
            return $?
          fi

          if (echo "$app" | grep -E '\.aab$'); then
            encrypt_aab_by_ijiami "$app" "$(dirname "$app")" "$plan_id"
            return $?
          fi

          st_log_warn "The \`$app\` app to be encrypted does not match the \`$filename_regex\` regex. Check the \`regex\` config."
          return 1
        }

        encrypt_apk_or_aab_by_ijiami "lawn-mower-stalco\.aab" "Stalco-aab"
      fi

      g_artifact_types="apk aab apk.idsig jar aar tar.gz zip"

      # rename filenames with version and build number for artifact files
      [ -d "." ] \
      && (
        suffix_regex="($(echo "$g_artifact_types" | sed -E -e 's/^ +//g' -e 's/ +$//g' -e 's/ +/|/g'))" \
        && find "." -maxdepth 1 -type d \
        | (grep -E "/([dD]ebug|[rR]elease|[rR]eports)$" || true) \
        | st_compatible_xargs_i_r "find \"{}\" -type f \
          | (grep -iE '\.$suffix_regex$' || true)" \
        | st_compatible_xargs_i_r "
          src=\"{}\" \
          && dest=\$(echo \"\$src\" | sed -E \"s/\\.$suffix_regex$/-$g_version-BUILD.$g_build_number.\\1/g\") \
          && mv \"\$src\" \"\$dest\"
        "
      )

      # recalculate sha256sum for artifact files
      [ -d "." ] \
        && rm -rf "./sha256sum.txt" \
        && find "." -maxdepth 1 -type d \
        | (grep -E "/([dD]ebug|[rR]elease|[rR]eports)$" || true) \
        | st_compatible_xargs_i_r "find \"{}\" -type f \
          | sed -E 's/^\.\///g'" \
        | st_compatible_xargs_i_r 'sha256sum "{}" >> "./sha256sum.txt"'

      st_build_save_incremental_build_number ".ci-tmp/build-numbers"
  artifacts:
    paths:
      - '[dD]ebug/'
      - '[rR]elease/'
      - '[rR]eports/'
      - '*repo-info.txt'
      - '*head-manifest.xml'
      - '*sha256sum.txt'
      - __args__
    when: always
  cache:
    key: $CI_PROJECT_PATH_SLUG
    paths:
      - .ci-cache
  rules:
    - if: $PCI_VARIANT == "stalco" && $CI_PIPELINE_SOURCE =~ /(web|schedule)/
